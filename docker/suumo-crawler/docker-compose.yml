services:
  suumo-crawler:
    build:
      context: ../..
      dockerfile: docker/suumo-crawler/Dockerfile
    environment:
      - DB_HOST=${DB_HOST}        # ZeroTier IP of local PostgreSQL server
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-suumo}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    restart: "no"
